name: Build Sandbox Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox-codex
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/sandbox-codex/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/sandbox-codex:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-claudecode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox-claudecode
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/sandbox-claudecode/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/sandbox-claudecode:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max